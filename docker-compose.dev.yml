# Development overrides — use alongside the base compose file:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Key differences from production:
#   - DB port exposed for local clients (TablePlus, psql, etc.)
#   - API and Web built to the 'deps' stage only (no compiled output)
#   - Source directories bind-mounted for hot reload
#   - Commands run the dev watch servers instead of compiled output

services:
  # ── Database ─────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fs_template}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"

  # ── API (NestJS — hot reload via nest start --watch) ─────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: deps
    command: >
      sh -c "pnpm --filter @repo/schemas build && pnpm db:migrate && pnpm dev"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-fs_template}
      PORT: 3001
      NODE_ENV: development
      SESSION_SECRET: ${SESSION_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
    volumes:
      # Bind-mount source only — node_modules stay inside the container
      - ./apps/api/src:/app/apps/api/src
      - ./packages/schemas/src:/app/packages/schemas/src
      # Config files not copied in the deps stage
      - ./tsconfig.json:/app/tsconfig.json:ro
      - ./apps/api/tsconfig.json:/app/apps/api/tsconfig.json:ro
      - ./apps/api/tsconfig.build.json:/app/apps/api/tsconfig.build.json:ro
      - ./apps/api/nest-cli.json:/app/apps/api/nest-cli.json:ro
      - ./apps/api/drizzle.config.ts:/app/apps/api/drizzle.config.ts:ro
      - ./apps/api/drizzle:/app/apps/api/drizzle:ro
      - ./packages/schemas/tsconfig.json:/app/packages/schemas/tsconfig.json:ro
    working_dir: /app/apps/api
    develop:
      watch:
        - action: sync
          path: ./apps/api/src
          target: /app/apps/api/src
        - action: sync
          path: ./packages/schemas/src
          target: /app/packages/schemas/src

  # ── Web (Next.js — hot reload via next dev) ──────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: deps
    command: sh -c "pnpm --filter @repo/schemas build && pnpm dev"
    environment:
      INTERNAL_API_URL: http://api:3001
      NODE_ENV: development
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./packages/schemas/src:/app/packages/schemas/src
      # Config files not copied in the deps stage
      - ./tsconfig.json:/app/tsconfig.json:ro
      - ./apps/web/tsconfig.json:/app/apps/web/tsconfig.json:ro
      - ./apps/web/next.config.ts:/app/apps/web/next.config.ts:ro
      - ./packages/schemas/tsconfig.json:/app/packages/schemas/tsconfig.json:ro
    working_dir: /app/apps/web
    develop:
      watch:
        - action: sync
          path: ./apps/web/src
          target: /app/apps/web/src
        - action: sync
          path: ./packages/schemas/src
          target: /app/packages/schemas/src
